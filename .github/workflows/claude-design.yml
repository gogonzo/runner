name: Claude Design Review
on:
  issues:
    types: [opened, labeled]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  design:
    if: contains(github.event.issue.labels.*.name, 'claude-design')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(gh issue comment *),Bash(gh issue edit *),Read,Glob,Grep"
          max_turns: 20
          prompt: |
            /design

            Post your analysis as a comment on issue #${{ github.event.issue.number }}.

            Issue title: ${{ github.event.issue.title }}
            Issue body: ${{ github.event.issue.body }}
