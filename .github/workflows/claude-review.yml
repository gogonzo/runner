name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_tools: "Bash(gh pr comment *),Bash(gh pr review *),Read,Glob,Grep"
          max_turns: 20
          prompt: |
            /review

            Post your review on PR #${{ github.event.pull_request.number }} using `gh pr review` or `gh pr comment`.
